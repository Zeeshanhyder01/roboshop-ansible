
#APP_COMMON_SETUP
#
#PRINT "Compile ${COMPONENT} Code"
#mv ${COMPONENT}-main ${COMPONENT} && cd ${COMPONENT} && mvn clean package &>>${LOG} && mv target/${COMPONENT}-1.0.jar ${COMPONENT}.jar
#CHECK_STAT $?
#
#SYSTEMD

- name : Installing Maven
  ansible.builtin.yum:
    name : maven
    state : installed

- name: Import common App Setup Configurations
  ansible.builtin.include_role:
    name: common
    tasks_from: AppSetup

- name : Install Maven Depencies
  ansible.builtin.shell : mvn clean package && mv target/${{COMPONENT}}-1.0.jar ${{COMPONENT}}.jar
  args:
    chdir : /home/roboshop/{{ COMPONENT }}

- name : SystemD Setup for {{ COMPONENT }} service
  ansible.builtin.include_role:
    name: common
    tasks_from: systemd
