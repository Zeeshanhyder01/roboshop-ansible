- name : setup YUM repos for nodejs
  ansible.builtin.shell: curl --silent --location https://rpm.nodesource.com/setup_16.x | sudo bash

- name: Install NodeJS
  ansible.builtin.yum:
    name: nodejs
    state: installed

- name: Import common App Setup Configurations
  ansible.builtin.include_role:
    name: common
    tasks_from: download
